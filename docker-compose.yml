services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "8765:80"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: development
    depends_on:
      - db

  db:
    image: mariadb:11.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: daybook
      MYSQL_USER: daybook
      MYSQL_PASSWORD: daybook
    ports:
      - "3307:3306"
    volumes:
      - daybook_mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: daybook
      PMA_PASSWORD: daybook
    depends_on:
      - db

volumes:
  daybook_mysql_data:
